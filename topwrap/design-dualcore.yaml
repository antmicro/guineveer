# this is guineveer's top-level design which you can show in KPM using `topwrap gui -d design.yaml`

name: guineveer

clock_domains:
  default:
    signal: clk_i
  i3c:
    signal: i3c_clk_i

reset_domains:
  default:
    signal: rst_ni
    polarity: active low
  cpu:
    signal: cpu_rst_ni
    polarity: active low
  i3c:
    signal: i3c_rst_ni
    polarity: active low

connections:
  interfaces:
    i3c_core:
      axi: [i_axi_cdc_lsu, m_axi_dst]
    uart_core:
      ahb: [axi_bridge, ahb]
    rvtop_wrapper0:
      el2_mem_export: [rvtop_wrapper0, el2_icache_export]
    rvtop_wrapper1:
      el2_mem_export: [rvtop_wrapper1, el2_icache_export]

  ports:
    rvtop_wrapper0:
      core_id: 0
      rst_vec: 0x40000000
    rvtop_wrapper1:
      core_id: 3
      rst_vec: 0x48000000
    i3c_core:
      scl_i: i3c_scl_i
      sda_i: i3c_sda_i
      scl_o: i3c_scl_o
      sda_o: i3c_sda_o
      scl_oe: i3c_scl_oe
      sda_oe: i3c_sda_oe
      sel_od_pp_o: i3c_sel_od_pp_o
    uart_core:
      uart_rx_i: uart_rx_i
      uart_tx_o: uart_tx_o

interconnects:
  axi_interconnect1:
    clock: clk_i
    reset: rst_ni
    type: AXI
    params:
      atop: False
    memory_map: mmap1
    managers:
      rvtop_wrapper0:
        ifu_axi:
          id_width: 3
        lsu_axi:
          id_width: 3
      rvtop_wrapper1:
        ifu_axi:
          id_width: 3
        lsu_axi:
          id_width: 3

memory_maps:
  mmap1:
    i_axi_cdc_lsu:
      s_axi_src:
        address: 0x30001000
    lmem0:
      address: 0x80000000
      size: 0x1f400
    lmem1:
      address: 0x90000000
      size: 0x1f400
    axi_bridge:
      axi:
        address: 0x30000000

external:
  ports:
    in:
    - clk_i
    - rst_ni
    - i3c_clk_i
    - i3c_rst_ni
    - i3c_sda_i
    - i3c_scl_i
    - cpu_rst_ni
    - uart_rx_i
    out:
    - i3c_sda_o
    - i3c_scl_o
    - i3c_sda_oe
    - i3c_scl_oe
    - i3c_sel_od_pp_o
    - uart_tx_o
    
ips:
  i_axi_cdc_lsu:
    file: repo[repo]:axi_cdc_wrapper
    parameters:
      ID_WIDTH: 5
    clocks:
      src: default
      dst: i3c
    resets:
      src: default
      dst: i3c

  lmem0:
    file: repo[repo]:sram_wrapper
    parameters:
      GUINEVEER_MEMORY_FILE: "`HEX_FILE0"
      ID_WIDTH: 5

  lmem1:
    file: repo[repo]:sram_wrapper
    parameters:
      GUINEVEER_MEMORY_FILE: "`HEX_FILE1"
      ID_WIDTH: 5

  axi_bridge:
    file: repo[repo]:axi4_to_ahb
    parameters:
      TAG: 5

  rvtop_wrapper0:
    file: repo[repo]:el2_veer_wrapper
    resets:
      cpu: cpu
      dbg: cpu

  rvtop_wrapper1:
    file: repo[repo]:el2_veer_wrapper
    resets:
      cpu: cpu
      dbg: cpu

  i3c_core:
    file: repo[repo]:i3c_wrapper
    parameters:
      AxiAddrWidth: 32
      AxiDataWidth: 64
      AxiUserWidth: 1
      AxiIdWidth: 5
    clocks:
      i3c: i3c
    resets:
      i3c: i3c

  uart_core:
    file: repo[repo]:uart_wrapper
