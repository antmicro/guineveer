id:
  library: libdefault
  name: axi_cdc_wrapper
  vendor: vendor

clocks:
  src:
    signal: src_clk_i
  dst:
    signal: dst_clk_i

resets:
  src:
    signal: src_rst_ni
    polarity: active low
  dst:
    signal: dst_rst_ni
    polarity: active low

interfaces:
  m_axi_dst:
    mode: manager
    clock: dst
    reset: dst
    signals:
      in:
        ARREADY: {name: m_axi_dst_arready}
        AWREADY: {name: m_axi_dst_awready}
        BID: {bound: [ID_WIDTH-1, '0'], name: m_axi_dst_bid}
        BRESP: {name: m_axi_dst_bresp}
        BUSER: {name: m_axi_dst_buser}
        BVALID: {name: m_axi_dst_bvalid}
        RDATA: {bound: ['63', '0'], name: m_axi_dst_rdata}
        RID: {bound: [ID_WIDTH-1, '0'], name: m_axi_dst_rid}
        RLAST: {name: m_axi_dst_rlast}
        RRESP: {name: m_axi_dst_rresp}
        RUSER: {name: m_axi_dst_ruser}
        RVALID: {name: m_axi_dst_rvalid}
        WREADY: {name: m_axi_dst_wready}
      out:
        ARADDR: {bound: ['31', '0'], name: m_axi_dst_araddr}
        ARBURST: {name: m_axi_dst_arburst}
        ARCACHE: {name: m_axi_dst_arcache}
        ARID: {bound: [ID_WIDTH-1, '0'], name: m_axi_dst_arid}
        ARLEN: {name: m_axi_dst_arlen}
        ARLOCK: {name: m_axi_dst_arlock}
        ARPROT: {name: m_axi_dst_arprot}
        ARQOS: {name: m_axi_dst_arqos}
        ARREGION: {name: m_axi_dst_arregion}
        ARSIZE: {name: m_axi_dst_arsize}
        ARUSER: {name: m_axi_dst_aruser}
        ARVALID: {name: m_axi_dst_arvalid}
        AWADDR: {bound: ['31', '0'], name: m_axi_dst_awaddr}
        AWBURST: {name: m_axi_dst_awburst}
        AWCACHE: {name: m_axi_dst_awcache}
        AWID: {bound: [ID_WIDTH-1, '0'], name: m_axi_dst_awid}
        AWLEN: {name: m_axi_dst_awlen}
        AWLOCK: {name: m_axi_dst_awlock}
        AWPROT: {name: m_axi_dst_awprot}
        AWQOS: {name: m_axi_dst_awqos}
        AWREGION: {name: m_axi_dst_awregion}
        AWSIZE: {name: m_axi_dst_awsize}
        AWUSER: {name: m_axi_dst_awuser}
        AWVALID: {name: m_axi_dst_awvalid}
        BREADY: {name: m_axi_dst_bready}
        RREADY: {name: m_axi_dst_rready}
        WDATA: {bound: ['63', '0'], name: m_axi_dst_wdata}
        WLAST: {name: m_axi_dst_wlast}
        WSTRB: {bound: ['7', '0'], name: m_axi_dst_wstrb}
        WUSER: {name: m_axi_dst_wuser}
        WVALID: {name: m_axi_dst_wvalid}
    type:
      library: libdefault
      name: AXI4
      vendor: vendor

  s_axi_src:
    mode: subordinate
    clock: src
    reset: src
    size: 0x1000
    signals:
      in:
        ARADDR: {bound: ['31', '0'], name: s_axi_src_araddr}
        ARBURST: {name: s_axi_src_arburst}
        ARCACHE: {name: s_axi_src_arcache}
        ARID: {bound: [ID_WIDTH-1, '0'], name: s_axi_src_arid}
        ARLEN: {name: s_axi_src_arlen}
        ARLOCK: {name: s_axi_src_arlock}
        ARPROT: {name: s_axi_src_arprot}
        ARQOS: {name: s_axi_src_arqos}
        ARREGION: {name: s_axi_src_arregion}
        ARSIZE: {name: s_axi_src_arsize}
        ARUSER: {name: s_axi_src_aruser}
        ARVALID: {name: s_axi_src_arvalid}
        AWADDR: {bound: ['31', '0'], name: s_axi_src_awaddr}
        AWBURST: {name: s_axi_src_awburst}
        AWCACHE: {name: s_axi_src_awcache}
        AWID: {bound: [ID_WIDTH-1, '0'], name: s_axi_src_awid}
        AWLEN: {name: s_axi_src_awlen}
        AWLOCK: {name: s_axi_src_awlock}
        AWPROT: {name: s_axi_src_awprot}
        AWQOS: {name: s_axi_src_awqos}
        AWREGION: {name: s_axi_src_awregion}
