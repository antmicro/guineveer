        BREADY: {name: s_axi_src_bready}
        RREADY: {name: s_axi_src_rready}
        WDATA: {bound: ['63', '0'], name: s_axi_src_wdata}
        WLAST: {name: s_axi_src_wlast}
        WSTRB: {bound: ['7', '0'], name: s_axi_src_wstrb}
        WUSER: {name: s_axi_src_wuser}
        WVALID: {name: s_axi_src_wvalid}
      out:
        ARREADY: {name: s_axi_src_arready}
        AWREADY: {name: s_axi_src_awready}
        BID: {bound: [ID_WIDTH-1, '0'], name: s_axi_src_bid}
        BRESP: {name: s_axi_src_bresp}
        BUSER: {name: s_axi_src_buser}
        BVALID: {name: s_axi_src_bvalid}
        RDATA: {bound: ['63', '0'], name: s_axi_src_rdata}
        RID: {bound: [ID_WIDTH-1, '0'], name: s_axi_src_rid}
        RLAST: {name: s_axi_src_rlast}
        RRESP: {name: s_axi_src_rresp}
        RUSER: {name: s_axi_src_ruser}
        RVALID: {name: s_axi_src_rvalid}
        WREADY: {name: s_axi_src_wready}
    type:
      library: libdefault
      name: AXI4
      vendor: vendor

parameters:
  ID_WIDTH: null

signals:
  in:
  - {name: src_clk_i}
  - {name: src_rst_ni}
  - {name: dst_clk_i}
  - {name: dst_rst_ni}
