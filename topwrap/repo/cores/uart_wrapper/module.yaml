id:
  library: libdefault
  name: uart_wrapper
  vendor: vendor

clocks:
  uart:
    signal: clk_i

resets:
  uart:
    signal: rst_ni
    polarity: active low

interfaces:
  ahb:
    mode: subordinate
    clock: uart
    reset: uart
    signals:
      in:
        HADDR: {bound: ['31', '0'], name: haddr_i}
        HSIZE: {bound: ['2', '0'], name: hsize_i}
        HTRANS: {bound: ['1', '0'], name: htrans_i}
        HWDATA: {bound: ['63', '0'], name: hwdata_i}
        HWRITE: {name: hwrite_i}
      out:
        HRDATA: {bound: ['63', '0'], name: hrdata_o}
        HRESP: {name: hresp_o}
    type: AHBguin

signals:
  in:
  - {name: clk_i}
  - {name: rst_ni}

  - {name: uart_rx_i}
  out:
  - {name: uart_tx_o}
