id:
  library: libdefault
  name: axi4_to_ahb
  vendor: vendor

clocks:
  bridge:
    signal: clk
  free_clk:
    signal: free_clk

resets:
  bridge:
    signal: rst_l
    polarity: active low

interfaces:
  ahb:
    mode: manager
    clock: bridge
    reset: bridge
    signals:
      in:
        HRDATA: {bound: ['63', '0'], name: ahb_hrdata}
        HRESP: {name: ahb_hresp}
      out:
        HADDR: {bound: ['31', '0'], name: ahb_haddr}
        HBURST: {bound: ['2', '0'], name: ahb_hburst}
        HMASTLOCK: {name: ahb_hmastlock}
        HPROT: {bound: ['3', '0'], name: ahb_hprot}
        HSIZE: {bound: ['2', '0'], name: ahb_hsize}
        HTRANS: {bound: ['1', '0'], name: ahb_htrans}
        HWDATA: {bound: ['63', '0'], name: ahb_hwdata}
        HWRITE: {name: ahb_hwrite}
    type:
      library: libdefault
      name: AHBguin
      vendor: vendor
      version: '1.0'

  axi:
    mode: subordinate
    clock: bridge
    reset: bridge
    size: 0x1000
    signals:
      in:
        ARADDR: {bound: ['31', '0'], name: axi_araddr}
        ARID: {bound: [TAG-1, '0'], name: axi_arid}
        ARPROT: {bound: ['2', '0'], name: axi_arprot}
        ARSIZE: {bound: ['2', '0'], name: axi_arsize}
        ARVALID: {name: axi_arvalid}
        AWADDR: {bound: ['31', '0'], name: axi_awaddr}
        AWID: {bound: [TAG-1, '0'], name: axi_awid}
        AWPROT: {bound: ['2', '0'], name: axi_awprot}
        AWSIZE: {bound: ['2', '0'], name: axi_awsize}
        AWVALID: {name: axi_awvalid}
        BREADY: {name: axi_bready}
        RREADY: {name: axi_rready}
        WDATA: {bound: ['63', '0'], name: axi_wdata}
        WLAST: {name: axi_wlast}
        WSTRB: {bound: ['7', '0'], name: axi_wstrb}
        WVALID: {name: axi_wvalid}
      out:
        ARREADY: {name: axi_arready}
        AWREADY: {name: axi_awready}
        BID: {bound: [TAG-1, '0'], name: axi_bid}
        BRESP: {bound: ['1', '0'], name: axi_bresp}
        BVALID: {name: axi_bvalid}
        RDATA: {bound: ['63', '0'], name: axi_rdata}
        RID: {bound: [TAG-1, '0'], name: axi_rid}
        RLAST: {name: axi_rlast}
        RRESP: {bound: ['1', '0'], name: axi_rresp}
        RVALID: {name: axi_rvalid}
        WREADY: {name: axi_wready}
    type:
      library: libdefault
      name: AXI4
      vendor: vendor

parameters:
  ID: '1'
  PRTY: '1'
  TAG: '1'

signals:
  in:
  - {name: clk}
  - {name: free_clk}
  - {name: rst_l}

  - {name: scan_mode, default: 0}

  - {name: bus_clk_en, default: 1}
  - {name: clk_override, default: 0}
  - {name: dec_tlu_force_halt, default: 0}

  - {name: ahb_hready, default: 1}
